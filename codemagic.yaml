# Codemagic: iOS сборка БЕЗ подписи и БЕЗ Apple Developer
# Start new build → Select workflow from codemagic.yaml → ios-no-codesign

workflows:
  ios-no-codesign:
    name: iOS Simulator (no code signing)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build for iOS Simulator (no code signing)
        script: |
          flutter build ios --simulator --debug

    artifacts:
      - build/ios/iphonesimulator/Runner.app
