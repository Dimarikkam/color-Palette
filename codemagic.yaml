# Codemagic: сборка iOS БЕЗ подписи (code signing)
# В Codemagic выберите: Settings → Build configuration → codemagic.yaml
# Workflow: ios-no-codesign

workflows:
  ios-no-codesign:
    name: iOS build without code signing
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter packages pub get

      - name: Generate iOS Flutter files
        script: |
          flutter build ios --config-only

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build iOS without code signing
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
